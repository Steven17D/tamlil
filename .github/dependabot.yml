version: 2
updates:
  # Python dependencies resolved through uv (project deps + the dev group).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Pinned-by-SHA actions in .github/workflows/ci.yml.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
