name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: CI only needs to read the checked-out tree.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # Fails if any first-party Python/Swift/shell source lacks an
      # Apache-2.0 SPDX header. Needs only git + bash, so it runs before uv.
      - name: SPDX headers
        run: scripts/check-spdx.sh
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
      - name: Install dependencies
        run: uv sync
      - name: Lint (ruff check)
        run: uv run ruff check .
      - name: Format check (ruff format)
        run: uv run ruff format --check .
      - name: Type-check (mypy)
        run: uv run mypy src
      # ffmpeg is intentionally not installed: the ffmpeg-binary tests skip
      # (not error) when the binary is absent, keeping the gate green on a
      # runner without it.
      - name: Test
        run: uv run pytest -q

  swift:
    name: Swift self-check
    runs-on: macos-15
    defaults:
      run:
        working-directory: Tamlil
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # No Xcode/XCTest on this project: swift test is unavailable, so the app
      # embeds its own assertion harness run via --self-check (see Makefile).
      - name: Build
        run: swift build
      - name: Self-check
        run: swift run Tamlil --self-check
